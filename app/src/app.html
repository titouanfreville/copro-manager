<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <!-- The manifest link is injected by +layout.svelte in production
         only — vite-pwa generates the file at build time, but in dev
         (`npm run dev`) the file isn't served and a static link here
         would 404 every page load. -->
    <link
      rel="apple-touch-icon"
      href="%sveltekit.assets%/icon-192.png"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#faf8f4" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Copro Manager</title>
    %sveltekit.head%
  </head>
  <body class="min-h-screen antialiased">
    <div id="app" style="display: contents">%sveltekit.body%</div>
  </body>
</html>
