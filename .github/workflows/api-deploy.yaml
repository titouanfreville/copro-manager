name: API · Build & deploy

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/api-deploy.yaml"
  workflow_dispatch:

concurrency:
  group: api-deploy
  cancel-in-progress: false

env:
  GAR_LOCATION: europe-west9
  GAR_REPO: api
  CLOUD_RUN_SERVICE: api
  CLOUD_RUN_REGION: europe-west9

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" --quiet

      - name: Resolve project ID
        id: project
        run: echo "id=$(gcloud config get-value project)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: api
          file: api/Dockerfile
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ steps.project.outputs.id }}/${{ env.GAR_REPO }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ steps.project.outputs.id }}/${{ env.GAR_REPO }}/${{ env.CLOUD_RUN_SERVICE }}:latest
          cache-from: type=registry,ref=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ steps.project.outputs.id }}/${{ env.GAR_REPO }}/${{ env.CLOUD_RUN_SERVICE }}:buildcache
          cache-to: type=registry,ref=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ steps.project.outputs.id }}/${{ env.GAR_REPO }}/${{ env.CLOUD_RUN_SERVICE }}:buildcache,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.CLOUD_RUN_REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ steps.project.outputs.id }}/${{ env.GAR_REPO }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}
