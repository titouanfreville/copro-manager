name: App · PR checks

on:
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/app-pr.yaml"
  workflow_dispatch:

concurrency:
  group: app-pr-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: app

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run check

  build:
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PUBLIC_API_BASE_URL: https://api.example.com
      PUBLIC_FIREBASE_API_KEY: ci
      PUBLIC_FIREBASE_PROJECT_ID: ci
      PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ci
      PUBLIC_FIREBASE_APP_ID: ci
      PUBLIC_FIREBASE_AUTH_DOMAIN: ""
      PUBLIC_FIREBASE_STORAGE_BUCKET: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build
