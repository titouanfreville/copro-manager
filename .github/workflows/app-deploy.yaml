name: App · Deploy to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/app-deploy.yaml"
  workflow_dispatch:

concurrency:
  group: app-deploy
  cancel-in-progress: false

defaults:
  run:
    working-directory: app

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write

    # Firebase web config is public by design — uses GitHub Actions Variables,
    # not Secrets. Set these once at the repo level.
    env:
      PUBLIC_API_BASE_URL: ${{ vars.PUBLIC_API_BASE_URL }}
      PUBLIC_FIREBASE_API_KEY: ${{ vars.PUBLIC_FIREBASE_API_KEY }}
      PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.PUBLIC_FIREBASE_PROJECT_ID }}
      PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      PUBLIC_FIREBASE_APP_ID: ${{ vars.PUBLIC_FIREBASE_APP_ID }}
      PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.PUBLIC_FIREBASE_AUTH_DOMAIN }}
      PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.PUBLIC_FIREBASE_STORAGE_BUCKET }}
      # VAPID public key, inlined into the SvelteKit build at compile time.
      # Without this var, push.ts:VAPID_PUBLIC_KEY is '' and the entire
      # Web Push flow no-ops in production.
      PUBLIC_VAPID_PUBLIC_KEY: ${{ vars.PUBLIC_VAPID_PUBLIC_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # Deploy via the firebase CLI directly so we use the WIF-issued ADC
      # written by `auth@v2` instead of a long-lived JSON key. Drops the
      # `FIREBASE_SERVICE_ACCOUNT_JSON` secret dependency entirely.
      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_PROJECT_ID: ${{ vars.PUBLIC_FIREBASE_PROJECT_ID }}
        run: firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID" --non-interactive
