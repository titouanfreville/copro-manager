name: API · PR checks

on:
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/api-pr.yaml"
  workflow_dispatch:

concurrency:
  group: api-pr-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: api

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache: true
          cache-dependency-path: api/go.sum
      - run: go mod download
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: api

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache: true
          cache-dependency-path: api/go.sum
      - run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - run: gosec ./...

  test:
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache: true
          cache-dependency-path: api/go.sum
      - run: go test -race -count=1 ./src/...

  build:
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache: true
          cache-dependency-path: api/go.sum
      - run: go build -o /dev/null ./bin/app
