logger:
  type: local
  name: copro-manager
  env: local

api:
  scheme: http
  host: 0.0.0.0
  port: 8080
  no_cache: true
  cors:
    allowed_methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed_headers:
      - "Authorization"
      - "Content-Type"
      - "X-Request-ID"
    allow_credentials: true
    max_age: 300s

firestore:
  project_id: copro-494909
  # Database is literally named "default" (created without the canonical parens).
  # The Go SDK takes this name via NewClientWithDatabase; the JS client passes
  # it explicitly to getFirestore() in app/src/lib/firebase.ts.
  database: default

storage:
  bucket: copro-manager-docs
  # Service account email used to V4-sign upload/download URLs via the
  # IAM Credentials API (the runtime SA has no downloadable key). Empty
  # locally → the client will try the GCE metadata server and fail outside
  # Cloud Run; set this in conf/local.yml for local dev. The user must
  # have roles/iam.serviceAccountTokenCreator on the chosen SA.
  signing_service_account: ""

middlewares:
  allow_bypass: false
  bypass_auth_key: ""
  # Global admin key gating the /admin/* endpoints. Empty disables admin entirely.
  # Override per-machine via conf/local.yml; in production via Secret Manager → Cloud Run env.
  admin_api_key: ""

otel:
  enabled: false
  service_name: copro-manager-api
