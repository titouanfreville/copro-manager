logger:
  type: local
  name: copro-manager
  env: local

api:
  scheme: http
  host: 0.0.0.0
  port: 8080
  no_cache: true
  cors:
    allowed_methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed_headers:
      - "Authorization"
      - "Content-Type"
      - "X-Request-ID"
    allow_credentials: true
    max_age: 300s

firestore:
  project_id: copro-494909
  # Database is literally named "default" (created without the canonical parens).
  # The Go SDK takes this name via NewClientWithDatabase; the JS client passes
  # it explicitly to getFirestore() in app/src/lib/firebase.ts.
  database: default

storage:
  bucket: copro-manager-docs
  # Service account email used to V4-sign upload/download URLs via the
  # IAM Credentials API (the runtime SA has no downloadable key). Empty
  # locally → the client will try the GCE metadata server and fail outside
  # Cloud Run; set this in conf/local.yml for local dev. The user must
  # have roles/iam.serviceAccountTokenCreator on the chosen SA.
  signing_service_account: ""

push:
  # Web Push VAPID keys. Generate locally with:
  #   go run github.com/SherClockHolmes/webpush-go/cmd/webpush-go@latest vapid
  # Public key is also exposed to the SvelteKit app at build time via
  # PUBLIC_VAPID_PUBLIC_KEY. Empty locally → push fan-out is a no-op
  # (in-app feed still works).
  private_key: ""
  public_key: ""
  subject: "mailto:dev@example.invalid"
  ttl_seconds: 86400

gemini:
  # Vertex AI Gemini for meter OCR (and, later, document classifier
  # plus chat assistant). NFR31: per-month cap protects against runaway
  # billing — once exceeded, callers respond with FEATURE_CAPPED until
  # the next month rolls over. Disable entirely with enabled: false.
  # Counter lives in Firestore at stats/ai_{YYYY-MM} (single doc,
  # atomic increment, shared by every Gemini-backed feature).
  enabled: true
  monthly_call_cap: 100
  project_id: copro-494909
  # europe-west9 (Paris) supports every Gemini model and matches the
  # rest of the stack — no cross-region egress, NFR15 EU-only ✓.
  region: europe-west9
  # gemini-2.5-flash strikes the right accuracy/cost ratio for visual
  # reasoning at our volume (~€0.04/mo at 50 calls/month).
  model: gemini-2.5-flash

middlewares:
  allow_bypass: false
  bypass_auth_key: ""
  # Global admin key gating the /admin/* endpoints. Empty disables admin entirely.
  # Override per-machine via conf/local.yml; in production via Secret Manager → Cloud Run env.
  admin_api_key: ""

otel:
  enabled: false
  service_name: copro-manager-api
