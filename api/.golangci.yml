version: "2"

formatters:
  enable:
    - gofmt

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    misspell:
      locale: US

run:
  timeout: 5m

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
